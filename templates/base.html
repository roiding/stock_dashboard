<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stock Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-graph-up-arrow me-1"></i>Stock Dashboard
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-columns-gap me-1"></i>总览</a></li>
        <li class="nav-item"><a class="nav-link {% if '/trades' in request.path %}active{% endif %}" href="/trades"><i class="bi bi-arrow-left-right me-1"></i>交易历史</a></li>
        <li class="nav-item"><a class="nav-link {% if '/tasks' in request.path %}active{% endif %}" href="/tasks"><i class="bi bi-clock-history me-1"></i>定时任务</a></li>
        <li class="nav-item"><a class="nav-link {% if '/files' in request.path %}active{% endif %}" href="/files"><i class="bi bi-folder2-open me-1"></i>文件管理</a></li>
      </ul>
      <span class="navbar-text text-secondary small">
        <i class="bi bi-circle-fill text-success me-1" style="font-size:.5rem;vertical-align:middle"></i>Running
      </span>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted small py-3 border-top mt-4">
  Stock Dashboard &mdash; Flask + MySQL + ECharts
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}

<!-- 60s 自动刷新 -->
<script>setTimeout(function(){ location.reload(); }, 60000);</script>
</body>
</html>
